# ============================================================================
# 使用说明
# ============================================================================
# 
# 1. 基础部署：
#    - 使用方案 1 的配置
#    - 将 dist 目录内容复制到 /usr/share/nginx/html/
#    - 重启 nginx: sudo nginx -s reload
# 
# 2. 生产环境：
#    - 使用方案 2 的配置（HTTPS）
#    - 配置 SSL 证书
#    - 更新 server_name 为你的域名
# 
# 3. Docker 部署：
#    - 使用方案 3 的配置
#    - 配合 nginx Docker 镜像使用
# 
# 核心配置说明：
# try_files $uri $uri/ /index.html;
# - $uri: 尝试访问请求的文件
# - $uri/: 尝试访问请求的目录
# - /index.html: 如果都找不到，返回 index.html（让 Vue Router 处理）
# 
# ============================================================================
